<!DOCTYPE html>
<html>
<head>
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(registration => console.log('Service Worker registered!'))
        .catch(err => console.log('Service Worker registration failed:', err));
    });
  }
</script>
  <meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover'>
  <meta charset='utf-8'>
  <style>
    html {
      height: 100%;
      width: 100%;
      background-color: #1d292c;
    }
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background-color: #1d292c;
      font-family: Helvetica, arial, sans-serif;
      position: relative;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    #application-canvas {
      display: block;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    #application-canvas.fill-mode-NONE { margin: auto; }
    #application-canvas.fill-mode-KEEP_ASPECT { width: 100%; height: auto; margin: 0; }
    #application-canvas.fill-mode-FILL_WINDOW { width: 100%; height: 100%; margin: 0; }
    canvas:focus { outline: none; }
  </style>
</head>

async function unzipWebpFromDataUri(dataUri) {
    const blobUrls = {};

   
    const base64 = dataUri.split(',')[1];
    const binaryString = atob(base64);
    const len = binaryString.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
    }

    //Load the zip
    const zip = await JSZip.loadAsync(bytes);


    for (let [filename, file] of Object.entries(zip.files)) {
    if (!file.dir) {
        let mime = '';

        if (filename.endsWith('.js') || filename.endsWith('.mjs')) {
            mime = 'text/javascript';
        } else if (filename.endsWith('.css')) {
            mime = 'text/css';
        } else if (filename.endsWith('.html')) {
            mime = 'text/html';
        } else if (filename.endsWith('.webp')) {
            mime = 'image/webp';
        } else if (filename.endsWith('.png')) {
            mime = 'image/png';
        } else if (filename.endsWith('.jpg') || filename.endsWith('.jpeg')) {
            mime = 'image/jpeg';
        }
      

        const rawBlob = await file.async("blob");
        const blob = mime ? new Blob([rawBlob], { type: mime }) : rawBlob;

        const blobUrl = URL.createObjectURL(blob);
        console.log(filename);
		filename = filename.replaceAll(" ", "%20");
        blobUrls[filename] = blobUrl;
    }
}


    return blobUrls;
